<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financeiro — ON Digital</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;padding:1.5rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-img{height:44px;width:auto}
.logo-text{font-size:17px;font-weight:700;color:#1a0f3c}
.logo-sub-text{font-size:12px;color:#666}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.badge-live{background:#d1e7dd;color:#0a5e38}
.badge-loading{background:#cfe2ff;color:#084298}
.badge-error{background:#f8d7da;color:#842029}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem}
.metric{background:#fff;border-radius:10px;padding:1rem;border:1px solid #e5e5e5}
.metric-label{font-size:12px;color:#666;margin-bottom:6px}
.metric-value{font-size:22px;font-weight:700}
.metric-delta{font-size:12px;margin-top:4px;color:#666}
.up{color:#0a5e38}.down{color:#c0392b}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:1.5rem}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem}
.card-title{font-size:14px;font-weight:600;margin-bottom:1rem}
.chart-wrap{position:relative;width:100%}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:#666}
.legend span{display:flex;align-items:center;gap:4px}
.lsq{width:10px;height:10px;border-radius:2px;display:inline-block}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 10px;color:#666;font-weight:500;border-bottom:1px solid #eee;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #f0f0f0}
.pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500}
.pill-ok{background:#d1e7dd;color:#0a5e38}
.pill-warn{background:#fff3cd;color:#856404}
.pill-err{background:#f8d7da;color:#842029}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <img src="https://dashboard-ondigital.netlify.app/logo.png" class="logo-img" onerror="this.style.display='none'">
    <div>
      <div class="logo-text">ON Digital</div>
      <div class="logo-sub-text">Gestão Financeira</div>
    </div>
  </div>
  <div>
    <span id="status-badge" class="badge badge-loading">Iniciando...</span>
  </div>
</div>

<div class="metrics">
  <div class="metric"><div class="metric-label">Total a receber</div><div class="metric-value" id="m1">R$ 0</div><div class="metric-delta" id="d1">—</div></div>
  <div class="metric"><div class="metric-label">Total a pagar</div><div class="metric-value down" id="m2">R$ 0</div><div class="metric-delta" id="d2">—</div></div>
  <div class="metric"><div class="metric-label">Receber vencidos</div><div class="metric-value down" id="m3">R$ 0</div><div class="metric-delta" id="d3">—</div></div>
  <div class="metric"><div class="metric-label">Saldo líquido</div><div class="metric-value" id="m4">R$ 0</div><div class="metric-delta" id="d4">—</div></div>
</div>

<div class="grid2">
  <div class="card" style="grid-column:span 2">
    <div class="card-title">Fluxo de Caixa (Últimos 100 títulos)</div>
    <div class="chart-wrap" style="height:240px"><canvas id="chart-fluxo"></canvas></div>
  </div>
</div>

<div class="card">
  <div class="card-title">Lançamentos Recentes (Omie)</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Vencimento</th><th>Descrição</th><th>Tipo</th><th>Valor</th><th>Status</th></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<script>
// COLOQUE ABAIXO A URL DO SEU RAILWAY (SEM A BARRA NO FINAL)
const RAILWAY_URL = 'https://web-production-62be6.up.railway.app';

const fmt = v => 'R$ ' + Math.abs(Math.round(v)).toLocaleString('pt-BR');
let charts = {};

async function omieCall(endpoint, call, param) {
  const res = await fetch(`${RAILWAY_URL}/omie/data`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ endpoint, call, param })
  });
  if (!res.ok) throw new Error('Falha na comunicação com o Railway');
  return await res.json();
}

async function carregarDashboard() {
  const badge = document.getElementById('status-badge');
  badge.className = 'badge badge-loading'; badge.textContent = 'Carregando Omie...';

  try {
    const [recData, pagData] = await Promise.all([
      omieCall('financas/contareceber', 'ListarContasReceber', { pagina: 1, registros_por_pagina: 50, apenas_importado_api: 'N' }),
      omieCall('financas/contapagar', 'ListarContasPagar', { pagina: 1, registros_por_pagina: 50, apenas_importado_api: 'N' })
    ]);

    const hoje = new Date();
    let tRec = 0, tPag = 0, vVenc = 0, nVenc = 0;
    const lista = [];

    (recData.conta_rece_cadastro || []).forEach(r => {
      const v = parseFloat(r.valor_documento || 0); tRec += v;
      const venc = r.data_vencimento ? new Date(r.data_vencimento.split('/').reverse().join('-')) : null;
      let st = 'Pendente';
      if (r.cancelada === 'S') st = 'Cancelado';
      else if (r.status_titulo === 'RECEBIDO') st = 'Recebido';
      else if (venc && venc < hoje) { st = 'Vencido'; vVenc += v; nVenc++; }
      lista.push({ data: r.data_vencimento, desc: r.nome_cliente, tipo: 'Receber', valor: v, status: st });
    });

    (recData.conta_paga_cadastro || []).forEach(p => {
      const v = parseFloat(p.valor_documento || 0); tPag += v;
      lista.push({ data: p.data_vencimento, desc: p.nome_fornecedor, tipo: 'Pagar', valor: -v, status: p.status_titulo });
    });

    // Atualiza Métricas
    document.getElementById('m1').textContent = fmt(tRec);
    document.getElementById('m2').textContent = fmt(tPag);
    document.getElementById('m3').textContent = fmt(vVenc);
    document.getElementById('m4').textContent = fmt(tRec - tPag);
    document.getElementById('d3').textContent = nVenc + ' títulos';

    // Atualiza Tabela
    document.getElementById('table-body').innerHTML = lista.slice(0, 20).map(item => `
      <tr>
        <td>${item.data}</td>
        <td>${item.desc}</td>
        <td>${item.tipo}</td>
        <td style="color:${item.valor < 0 ? '#c0392b' : '#1a1a1a'}">${fmt(item.valor)}</td>
        <td><span class="pill ${item.status === 'Recebido' ? 'pill-ok' : 'pill-warn'}">${item.status}</span></td>
      </tr>
    `).join('');

    badge.className = 'badge badge-live'; badge.textContent = 'Omie Conectado';
  } catch (e) {
    badge.className = 'badge badge-error'; badge.textContent = 'Erro de Conexão';
    console.error(e);
  }
}

window.onload = carregarDashboard;
</script>
</body>
</html>
