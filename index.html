<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financeiro — ON Digital</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;padding:1.5rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-img{height:44px;width:auto}
.logo-text{font-size:17px;font-weight:700;color:#1a0f3c}
.controls{display:flex; gap:8px; align-items:center;}
.input-omie{padding:8px; border-radius:6px; border:1px solid #ccc; font-size:13px; width:150px;}
.btn-connect{padding:8px 16px; background:#2d1b69; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:600;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem}
.metric{background:#fff;border-radius:10px;padding:1rem;border:1px solid #e5e5e5}
.metric-label{font-size:12px;color:#666;margin-bottom:6px}
.metric-value{font-size:22px;font-weight:700}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem}
.table-wrap{overflow-x:auto; margin-top:1rem;}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px;color:#666;border-bottom:1px solid #eee}
td{padding:10px;border-bottom:1px solid #f0f0f0}
.pill{padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600;}
.pill-ok{background:#d1e7dd;color:#0a5e38}
.pill-warn{background:#fff3cd;color:#856404}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div>
      <div class="logo-text">ON Digital</div>
      <div style="font-size:12px;color:#666">Gestão Financeira</div>
    </div>
  </div>
  <div class="controls">
    <input type="text" id="app-key" class="input-omie" placeholder="App Key">
    <input type="password" id="app-secret" class="input-omie" placeholder="App Secret">
    <button class="btn-connect" id="btn-main" onclick="carregarDashboard()">Conectar Omie</button>
  </div>
</div>

<div class="metrics">
  <div class="metric"><div class="metric-label">Total a receber</div><div class="metric-value" id="m1">R$ 0</div></div>
  <div class="metric"><div class="metric-label">Total a pagar</div><div class="metric-value" id="m2" style="color:#c0392b">R$ 0</div></div>
  <div class="metric"><div class="metric-label">Saldo</div><div class="metric-value" id="m4">R$ 0</div></div>
</div>

<div class="card">
  <div style="font-weight:600">Lançamentos Recentes</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Vencimento</th><th>Descrição</th><th>Valor</th><th>Status</th></tr></thead>
      <tbody id="table-body">
        <tr><td colspan="4" style="text-align:center; color:#999; padding:20px;">Insira as chaves acima para carregar os dados.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const RAILWAY_URL = 'https://web-production-62be6.up.railway.app';
const fmt = v => 'R$ ' + Math.abs(Math.round(v)).toLocaleString('pt-BR');

async function omieCall(endpoint, call, param) {
  const key = document.getElementById('app-key').value;
  const secret = document.getElementById('app-secret').value;

  const res = await fetch(`${RAILWAY_URL}/omie/data`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ endpoint, call, param, app_key: key, app_secret: secret })
  });
  return await res.json();
}

async function carregarDashboard() {
  const btn = document.getElementById('btn-main');
  btn.textContent = 'Carregando...';
  btn.disabled = true;

  try {
    const [recData, pagData] = await Promise.all([
      omieCall('financas/contareceber', 'ListarContasReceber', { pagina: 1, registros_por_pagina: 20, apenas_importado_api: 'N' }),
      omieCall('financas/contapagar', 'ListarContasPagar', { pagina: 1, registros_por_pagina: 20, apenas_importado_api: 'N' })
    ]);

    let tRec = 0, tPag = 0;
    const lista = [];

    (recData.conta_receber_cadastro || []).forEach(r => {
      const v = parseFloat(r.valor_documento || 0); tRec += v;
      lista.push({ data: r.data_vencimento, desc: r.nome_cliente, valor: v, status: r.status_titulo });
    });

    (pagData.conta_pagar_cadastro || []).forEach(p => {
      const v = parseFloat(p.valor_documento || 0); tPag += v;
      lista.push({ data: p.data_vencimento, desc: p.nome_fornecedor, valor: -v, status: p.status_titulo });
    });

    document.getElementById('m1').textContent = fmt(tRec);
    document.getElementById('m2').textContent = fmt(tPag);
    document.getElementById('m4').textContent = fmt(tRec - tPag);

    document.getElementById('table-body').innerHTML = lista.map(item => `
      <tr>
        <td>${item.data || '---'}</td>
        <td>${item.desc || '---'}</td>
        <td style="color:${item.valor < 0 ? '#c0392b' : '#1a1a1a'}">${fmt(item.valor)}</td>
        <td><span class="pill ${item.status === 'RECEBIDO' || item.status === 'PAGO' ? 'pill-ok' : 'pill-warn'}">${item.status || 'PENDENTE'}</span></td>
      </tr>
    `).join('');

    btn.textContent = 'Atualizar';
  } catch (e) {
    alert('Erro ao conectar. Verifique as chaves e se o Railway está online.');
    btn.textContent = 'Conectar Omie';
  }
  btn.disabled = false;
}
</script>
</body>
</html>
