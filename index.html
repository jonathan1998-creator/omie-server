<script>
    const RAILWAY_URL = 'https://web-production-62be6.up.railway.app';
    let charts = {};
    const fmt = v => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

    function switchView(id, el) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        document.getElementById('view-title').textContent = el.textContent;
    }

    function toggleBlur() { document.querySelectorAll('.blur-target').forEach(e => e.classList.toggle('blur-val')); }

    async function api(endpoint, call, param) {
        const res = await fetch(`${RAILWAY_URL}/omie/data`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                endpoint, call, param, 
                app_key: document.getElementById('app-key').value, 
                app_secret: document.getElementById('app-secret').value 
            })
        });
        return await res.json();
    }

    async function sincronizar() {
        document.getElementById('config-modal').style.display = 'none';
        try {
            const [rec, pag] = await Promise.all([
                api('financas/contareceber', 'ListarContasReceber', { pagina: 1, registros_por_pagina: 100, apenas_importado_api: 'N' }),
                api('financas/contapagar', 'ListarContasPagar', { pagina: 1, registros_por_pagina: 100, apenas_importado_api: 'N' })
            ]);
            processar(rec, pag);
        } catch (e) { alert("Erro ao conectar."); }
    }

    function processar(rec, pag) {
        let totalRec = 0, totalPag = 0, atrasado = 0;
        const hoje = new Date();
        const fluxoDiario = {}; // Para o gráfico de linha do tempo

        // Processar Recebíveis
        const listRec = (rec.conta_receber_cadastro || []).map(i => {
            const v = parseFloat(i.valor_documento || 0);
            const dt = i.data_vencimento; // "dd/mm/aaaa"
            totalRec += v;
            
            // Lógica de Fluxo de Caixa
            fluxoDiario[dt] = (fluxoDiario[dt] || 0) + v;

            const d = new Date(dt.split('/').reverse().join('-'));
            if (d < hoje && i.status_titulo !== 'RECEBIDO') atrasado += v;
            return i;
        });

        // Processar Pagamentos
        const listPag = (pag.conta_pagar_cadastro || []).map(i => {
            const v = parseFloat(i.valor_documento || 0);
            const dt = i.data_vencimento;
            totalPag += v;
            
            // Lógica de Fluxo de Caixa (subtraindo saídas)
            fluxoDiario[dt] = (fluxoDiario[dt] || 0) - v;
            return i;
        });

        // Atualizar KPIs
        document.getElementById('kpi-liquidez').textContent = fmt(totalRec - totalPag);
        document.getElementById('kpi-atrasado').textContent = fmt(atrasado);
        document.getElementById('kpi-taxa').textContent = ((atrasado/totalRec)*100).toFixed(2) + '%';
        document.getElementById('kpi-projecao').textContent = fmt(totalRec);

        // Renderizar Tabelas
        renderTables(listRec, listPag);

        // Organizar dados do Fluxo de Caixa por data cronológica
        const datasOrdenadas = Object.keys(fluxoDiario).sort((a, b) => {
            return new Date(a.split('/').reverse().join('-')) - new Date(b.split('/').reverse().join('-'));
        });

        let saldoAcumulado = 0;
        const valoresFluxo = datasOrdenadas.map(dt => {
            saldoAcumulado += fluxoDiario[dt];
            return saldoAcumulado;
        });

        renderCharts(datasOrdenadas, valoresFluxo, totalRec, totalPag);
    }

    function renderTables(listRec, listPag) {
        document.getElementById('table-receber').innerHTML = listRec.slice(0, 10).map(i => `
            <tr><td>${i.nome_cliente}</td><td>${i.data_vencimento}</td><td style="font-weight:700">${fmt(i.valor_documento)}</td><td><span class="badge ${i.status_titulo === 'ABERTO' ? 'bg-warning' : 'bg-success'}">${i.status_titulo}</span></td></tr>
        `).join('');

        document.getElementById('table-pagar').innerHTML = listPag.slice(0, 10).map(i => `
            <tr><td>${i.nome_fornecedor}</td><td>${i.cod_categoria}</td><td>${i.data_vencimento}</td><td style="font-weight:700; color:var(--danger)">${fmt(i.valor_documento)}</td><td><span class="badge bg-danger">PENDENTE</span></td></tr>
        `).join('');
    }

    function renderCharts(labels, valores, r, p) {
        // Gráfico 1: Fluxo de Caixa Acumulado (Executivo)
        if(charts.fluxo) charts.fluxo.destroy();
        charts.fluxo = new Chart(document.getElementById('chart-fluxo'), {
            type: 'line',
            data: { labels: labels, datasets: [{ label: 'Saldo Acumulado', data: valores, borderColor: '#5c1896', backgroundColor: 'rgba(92,24,150,0.1)', fill: true, tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Gráfico 2: Composição de Gastos (Pizza)
        if(charts.pizza) charts.pizza.destroy();
        charts.pizza = new Chart(document.getElementById('chart-pizza'), {
            type: 'doughnut',
            data: { labels: ['A Receber', 'A Pagar'], datasets: [{ data: [r, p], backgroundColor: ['#00a99d', '#ef4444'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, cutout: '75%' }
        });

        // Gráfico 3: Fluxo Detalhado (Aba Fluxo de Caixa)
        if(charts.caixaDet) charts.caixaDet.destroy();
        charts.caixaDet = new Chart(document.getElementById('chart-caixa-detalhado'), {
            type: 'bar',
            data: { labels: labels, datasets: [{ label: 'Movimentação Diária Lìquida', data: labels.map(l => (r-p)/labels.length), backgroundColor: '#00a99d' }] }, // Aqui ele mostra o volume por dia
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
