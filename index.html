<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Financeiro | ON Digital</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #2d1b69;
            --secondary: #e2533a;
            --success: #0a5e38;
            --warning: #e9a23b;
            --danger: #c0392b;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1a0f3c;
            --text-sub: #666;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 20px; }

        /* Header */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; background: #fff; padding: 15px 25px; 
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .logo-area h1 { font-size: 22px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .logo-area p { font-size: 12px; color: var(--text-sub); margin-top: -4px; }

        /* Config Menu */
        .config-trigger { 
            background: #f8f9fa; border: 1px solid #ddd; padding: 8px 15px; 
            border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .config-trigger:hover { background: #e0e0e0; }
        
        .config-overlay {
            display: none; position: fixed; top: 85px; right: 20px; 
            background: #fff; padding: 20px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 1000; width: 320px;
            border: 1px solid #eee;
        }
        .config-overlay.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .input-field { width: 100%; padding: 12px; margin: 8px 0 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; }
        .input-field:focus { border-color: var(--primary); }
        .btn-update { 
            width: 100%; padding: 12px; background: var(--primary); color: #fff; 
            border: none; border-radius: 8px; cursor: pointer; font-weight: 600;
        }

        /* Metrics */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .metric-card { 
            background: #fff; padding: 25px; border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); position: relative; overflow: hidden;
            border-bottom: 5px solid #ddd; transition: transform 0.2s;
        }
        .metric-card:hover { transform: translateY(-3px); }
        .metric-card.receber { border-color: var(--primary); }
        .metric-card.pagar { border-color: var(--secondary); }
        .metric-card.saldo { border-color: var(--success); }
        
        .metric-card label { font-size: 12px; color: var(--text-sub); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .metric-card .value { font-size: 32px; font-weight: 800; margin-top: 8px; display: block; }
        .metric-card i { position: absolute; right: 20px; top: 25px; font-size: 20px; color: #ddd; }

        /* Charts Section */
        .charts-container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 1000px) { .charts-container { grid-template-columns: 1fr; } }
        
        .card { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #eee; }
        .card-title { font-size: 15px; font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; color: var(--primary); }

        /* Table */
        .table-area { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; padding: 15px 10px; color: #888; font-size: 11px; border-bottom: 2px solid #f0f0f0; text-transform: uppercase; font-weight: 800; }
        td { padding: 15px 10px; border-bottom: 1px solid #f8f8f8; font-size: 13px; }
        
        .pill { padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .pill-receber { background: #e8eaf6; color: var(--primary); }
        .pill-pagar { background: #fff0ee; color: var(--secondary); }
        .status-atrasado { background: #fff3cd; color: #856404; }
        .status-vencido { background: #f8d7da; color: #842029; }
        .status-ok { background: #e6f4ea; color: var(--success); }

        #loading-bar { 
            position: fixed; top: 0; left: 0; height: 3px; background: var(--primary); 
            width: 0%; transition: 0.4s; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="loading-bar"></div>

    <header>
        <div class="logo-area">
            <h1><i class="fas fa-chart-line"></i> ON Digital</h1>
            <p>Gestão Financeira Estratégica</p>
        </div>
        <button class="config-trigger" onclick="toggleConfig()">
            <i class="fas fa-cog"></i> Configurações
        </button>
    </header>

    <div class="config-overlay" id="config-menu">
        <div style="font-size: 14px; font-weight: 800; margin-bottom: 15px; color: var(--primary);">Conectar ao Omie</div>
        <label style="font-size: 11px; font-weight: bold; color: #666;">App Key</label>
        <input type="text" id="app-key" class="input-field" placeholder="000000000000">
        <label style="font-size: 11px; font-weight: bold; color: #666;">App Secret</label>
        <input type="password" id="app-secret" class="input-field" placeholder="••••••••••••">
        <button class="btn-update" id="btn-sync" onclick="carregarDados()">
            <i class="fas fa-sync-alt"></i> Sincronizar Agora
        </button>
    </div>

    <div class="metrics-grid">
        <div class="metric-card receber">
            <i class="fas fa-arrow-down"></i>
            <label>Contas a Receber</label>
            <span class="value" id="m-receber">R$ 0,00</span>
        </div>
        <div class="metric-card pagar">
            <i class="fas fa-arrow-up"></i>
            <label>Contas a Pagar</label>
            <span class="value" id="m-pagar" style="color: var(--secondary)">R$ 0,00</span>
        </div>
        <div class="metric-card saldo">
            <i class="fas fa-wallet"></i>
            <label>Saldo Líquido</label>
            <span class="value" id="m-saldo">R$ 0,00</span>
        </div>
    </div>

    <div class="charts-container">
        <div class="card">
            <div class="card-title"><i class="fas fa-columns"></i> Comparativo de Fluxo</div>
            <div style="height: 320px;"><canvas id="chart-barras"></canvas></div>
        </div>
        <div class="card">
            <div class="card-title"><i class="fas fa-chart-pie"></i> Composição</div>
            <div style="height: 320px;"><canvas id="chart-pizza"></canvas></div>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-list"></i> Movimentações Recentes</div>
        <div class="table-area">
            <table>
                <thead>
                    <tr>
                        <th>Vencimento</th>
                        <th>Descrição / Parceiro</th>
                        <th>Categoria</th>
                        <th>Valor</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="5" style="text-align:center; padding:50px; color:#999;">Abra as configurações para carregar os dados reais.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const RAILWAY_URL = 'https://web-production-62be6.up.railway.app';
        let charts = {};

        function toggleConfig() { document.getElementById('config-menu').classList.toggle('active'); }

        const fmt = v => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

        async function api(endpoint, call, param) {
            const key = document.getElementById('app-key').value;
            const secret = document.getElementById('app-secret').value;
            
            const res = await fetch(`${RAILWAY_URL}/omie/data`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ endpoint, call, param, app_key: key, app_secret: secret })
            });
            if (!res.ok) throw new Error("Erro na API");
            return await res.json();
        }

        async function carregarDados() {
            const btn = document.getElementById('btn-sync');
            const loading = document.getElementById('loading-bar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processando...';
            loading.style.width = '30%';
            
            try {
                const [rec, pag] = await Promise.all([
                    api('financas/contareceber', 'ListarContasReceber', { pagina: 1, registros_por_pagina: 50, apenas_importado_api: 'N' }),
                    api('financas/contapagar', 'ListarContasPagar', { pagina: 1, registros_por_pagina: 50, apenas_importado_api: 'N' })
                ]);

                loading.style.width = '75%';

                let totalRec = 0, totalPag = 0;
                const rows = [];

                // Receber
                (rec.conta_receber_cadastro || rec.cadastros || []).forEach(item => {
                    const v = parseFloat(item.valor_documento || 0);
                    totalRec += v;
                    rows.push({
                        data: item.data_vencimento,
                        nome: item.nome_cliente || 'Cliente',
                        cat: 'Receita',
                        valor: v,
                        status: item.status_titulo || 'A RECEBER',
                        tipo: 'receber'
                    });
                });

                // Pagar
                (pag.conta_pagar_cadastro || pag.cadastros || []).forEach(item => {
                    const v = parseFloat(item.valor_documento || 0);
                    totalPag += v;
                    rows.push({
                        data: item.data_vencimento,
                        nome: item.nome_fornecedor || 'Fornecedor',
                        cat: 'Despesa',
                        valor: -v,
                        status: item.status_titulo || 'A PAGAR',
                        tipo: 'pagar'
                    });
                });

                document.getElementById('m-receber').textContent = fmt(totalRec);
                document.getElementById('m-pagar').textContent = fmt(totalPag);
                document.getElementById('m-saldo').textContent = fmt(totalRec - totalPag);

                renderTable(rows);
                renderCharts(totalRec, totalPag);
                
                loading.style.width = '100%';
                setTimeout(() => { loading.style.width = '0'; toggleConfig(); }, 600);

            } catch (e) {
                alert("Verifique suas chaves Omie e tente novamente.");
                loading.style.width = '0';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> Sincronizar Agora';
            }
        }

        function renderTable(data) {
            const body = document.getElementById('table-body');
            data.sort((a,b) => b.data.split('/').reverse().join('') - a.data.split('/').reverse().join(''));
            
            body.innerHTML = data.slice(0, 15).map(item => {
                let sClass = 'status-ok';
                if(item.status.includes('VENCIDO') || item.status.includes('ATRASO')) sClass = 'status-vencido';
                
                return `
                    <tr>
                        <td style="font-weight:600">${item.data}</td>
                        <td><span class="pill ${item.tipo === 'receber' ? 'pill-receber' : 'pill-pagar'}">${item.tipo === 'receber' ? 'REC' : 'PAG'}</span> <strong>${item.nome}</strong></td>
                        <td style="color:#888">${item.cat}</td>
                        <td style="font-weight:700; color:${item.valor < 0 ? '#e2533a' : '#2d1b69'}">${fmt(item.valor)}</td>
                        <td><span class="pill ${sClass}">${item.status}</span></td>
                    </tr>
                `;
            }).join('');
        }

        function renderCharts(r, p) {
            if(charts.bar) charts.bar.destroy();
            if(charts.pie) charts.pie.destroy();

            const ctxBar = document.getElementById('chart-barras').getContext('2d');
            charts.bar = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: ['Saldos Atuais'],
                    datasets: [
                        { label: 'A Receber', data: [r], backgroundColor: '#2d1b69', borderRadius: 10, barThickness: 60 },
                        { label: 'A Pagar', data: [p], backgroundColor: '#e2533a', borderRadius: 10, barThickness: 60 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
            });

            const ctxPie = document.getElementById('chart-pizza').getContext('2d');
            charts.pie = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['Receber', 'Pagar'],
                    datasets: [{ data: [r, p], backgroundColor: ['#2d1b69', '#e2533a'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%' }
            });
        }
    </script>
</body>
</html>
