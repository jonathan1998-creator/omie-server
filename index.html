<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financeiro — ON Digital</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;padding:1.5rem}
#login-screen{position:fixed;inset:0;background:#1a0f3c;display:flex;align-items:center;justify-content:center;z-index:999}
#login-screen.hidden{display:none}
.login-box{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:400px;margin:1rem;text-align:center}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-img{height:44px;width:auto}
.logo-text{font-size:17px;font-weight:700;color:#1a0f3c}
.logo-sub-text{font-size:12px;color:#666}
.config-btn{padding:7px 16px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer}
.config-btn:hover{background:#f0f0f0}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.badge-demo{background:#fff3cd;color:#856404}
.badge-live{background:#d1e7dd;color:#0a5e38}
.badge-loading{background:#cfe2ff;color:#084298}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.75rem;width:100%;max-width:420px;margin:1rem;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h3{font-size:17px;font-weight:600;margin-bottom:6px}
.modal p{font-size:13px;color:#555;margin-bottom:1.25rem}
.modal label{font-size:13px;color:#555;display:block;margin-bottom:4px}
.modal input{width:100%;padding:9px 12px;font-size:14px;border:1px solid #ccc;border-radius:8px;margin-bottom:12px}
.modal input:focus{outline:none;border-color:#2d1b69}
.hint{font-size:11px;color:#999;margin-top:-8px;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-primary{padding:9px 20px;font-size:13px;border-radius:8px;border:none;background:#2d1b69;color:#fff;cursor:pointer;font-weight:600}
.btn-primary:hover{background:#1e1247}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-sec{padding:9px 20px;font-size:13px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer}
.err-msg{font-size:12px;color:#c0392b;margin-top:8px;display:none;line-height:1.5}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem}
.metric{background:#fff;border-radius:10px;padding:1rem;border:1px solid #e5e5e5}
.metric-label{font-size:12px;color:#666;margin-bottom:6px}
.metric-value{font-size:22px;font-weight:700}
.metric-delta{font-size:12px;margin-top:4px;color:#666}
.up{color:#0a5e38}.down{color:#c0392b}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:1.5rem}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem}
.card-title{font-size:14px;font-weight:600;margin-bottom:1rem}
.chart-wrap{position:relative;width:100%}
.tabs{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:5px 13px;font-size:12px;border-radius:20px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#555}
.tab.active{background:#2d1b69;color:#fff;border-color:#2d1b69}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 10px;color:#666;font-weight:500;border-bottom:1px solid #eee;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #f0f0f0}
tr:last-child td{border-bottom:none}
.pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500}
.pill-ok{background:#d1e7dd;color:#0a5e38}
.pill-warn{background:#fff3cd;color:#856404}
.pill-err{background:#f8d7da;color:#842029}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:#666}
.legend span{display:flex;align-items:center;gap:4px}
.lsq{width:10px;height:10px;border-radius:2px;display:inline-block}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <img src="data:image/png;base64,/9j/4AAQ
